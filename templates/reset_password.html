<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Bodhini AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h1>Bodhini AI</h1>
        <p>Reset your password</p>

        {% if error %}
        <div class="auth-message auth-error">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Registered email"
                value="{{ email or '' }}"
                required
            >

            <input
                type="password"
                name="new_password"
                placeholder="New password"
                required
            >

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm new password"
                required
            >

            <button type="submit">
                Reset Password
            </button>

        </form>

        <a href="/login">
            Back to Login
        </a>

    </div>
</div>

</body>
</html>
