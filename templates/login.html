<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bodhini AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h1>Bodhini AI</h1>
        <p>Welcome Back</p>

        {% if success %}
        <div class="auth-message auth-success">
            {{ success }}
        </div>
        {% endif %}

        {% if error %}
        <div class="auth-message auth-error">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email"
                value="{{ email or '' }}"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <a href="/register">
            Don't have an account? Register
        </a>

        <a href="/reset-password">
            Forgot password? Reset it
        </a>

    </div>
</div>

</body>
</html>
