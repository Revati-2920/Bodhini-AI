<aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-header">
        <div class="brand">Bodhini AI</div>
        <div class="brand-sub">Admin Panel</div>
    </div>

    <nav class="admin-nav">
        {% set ep = request.endpoint or '' %}
        <a href="{{ url_for('admin.dashboard') }}" class="{% if ep == 'admin.dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="{{ url_for('admin.users_list') }}" class="{% if 'user' in ep %}active{% endif %}">
            <i class="fas fa-users"></i> Users
        </a>
        <a href="{{ url_for('admin.resumes_list') }}" class="{% if ep == 'admin.resumes_list' %}active{% endif %}">
            <i class="fas fa-file-alt"></i> Resume Reports
        </a>
        <a href="{{ url_for('admin.ats_reports') }}" class="{% if 'ats' in ep %}active{% endif %}">
            <i class="fas fa-chart-bar"></i> ATS Reports
        </a>
        <a href="{{ url_for('admin.placements_list') }}" class="{% if ep == 'admin.placements_list' %}active{% endif %}">
            <i class="fas fa-bullseye"></i> Placement Predictions
        </a>
        <a href="{{ url_for('admin.interviews_list') }}" class="{% if ep == 'admin.interviews_list' %}active{% endif %}">
            <i class="fas fa-microphone"></i> Interview Reports
        </a>
        <a href="{{ url_for('admin.skill_gaps_list') }}" class="{% if ep == 'admin.skill_gaps_list' %}active{% endif %}">
            <i class="fas fa-brain"></i> Skill Gap Reports
        </a>
        <a href="{{ url_for('admin.chat_logs') }}" class="{% if ep == 'admin.chat_logs' %}active{% endif %}">
            <i class="fas fa-comments"></i> AI Chat Logs
        </a>
        <a href="{{ url_for('admin.companies_list') }}" class="{% if 'compan' in ep %}active{% endif %}">
            <i class="fas fa-building"></i> Companies
        </a>
        <a href="{{ url_for('admin.events_list') }}" class="{% if 'event' in ep %}active{% endif %}">
            <i class="fas fa-calendar-alt"></i> Events
        </a>
        <a href="{{ url_for('admin.resources_list') }}" class="{% if 'resource' in ep %}active{% endif %}">
            <i class="fas fa-book"></i> Learning Resources
        </a>
        <a href="{{ url_for('admin.announcements_list') }}" class="{% if 'announcement' in ep %}active{% endif %}">
            <i class="fas fa-bullhorn"></i> Announcements
        </a>
        <a href="{{ url_for('admin.settings') }}" class="{% if ep == 'admin.settings' %}active{% endif %}">
            <i class="fas fa-cog"></i> Settings
        </a>
    </nav>

    <div class="admin-sidebar-footer">
        <a href="{{ url_for('admin.admin_logout') }}">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</aside>
