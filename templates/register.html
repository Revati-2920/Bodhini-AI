<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Bodhini AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<div class="auth-container">


<div class="auth-card">

    <h1>Bodhini AI</h1>
    <p>Create your account</p>

    {% if error %}
    <div class="auth-message auth-error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               value="{{ username or '' }}"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               value="{{ email or '' }}"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <a href="/">Back to Home</a>

</div>


</div>

</body>
</html>
