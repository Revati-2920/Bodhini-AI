{% extends 'student/base.html' %}
{% block title %}Settings | Bodhini AI{% endblock %}
{% block content %}
<h1>Settings</h1>
<p class="subtitle">Customize your Bodhini AI experience</p>

<div class="glass-card premium-form" style="margin-bottom:24px;">
    <h3 style="margin-bottom:16px;"><i class="fas fa-palette"></i> Appearance</h3>
    <form method="POST">
        <input type="hidden" name="action" value="general">
        <div class="form-grid">
            <div class="form-group"><label>Theme</label>
                <select name="theme">
                    <option value="dark" {% if user.theme != 'light' %}selected{% endif %}>Dark Mode</option>
                    <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light Mode</option>
                </select>
            </div>
            <div class="form-group"><label>Language</label>
                <select name="language">
                    <option value="en" {% if user.language == 'en' %}selected{% endif %}>English</option>
                    <option value="hi" {% if user.language == 'hi' %}selected{% endif %}>Hindi</option>
                </select>
            </div>
        </div>
        <h3 style="margin:20px 0 12px;"><i class="fas fa-bell"></i> Notifications</h3>
        <label><input type="checkbox" name="notify_email" {% if user.notify_email %}checked{% endif %}> Email Notifications</label><br>
        <label><input type="checkbox" name="notify_push" {% if user.notify_push %}checked{% endif %}> In-App Notifications</label>
        <br><button type="submit" class="btn-gradient" style="margin-top:16px;">Save Preferences</button>
    </form>
</div>

<div class="glass-card premium-form" style="margin-bottom:24px;">
    <h3 style="margin-bottom:16px;"><i class="fas fa-key"></i> Change Password</h3>
    <form method="POST">
        <input type="hidden" name="action" value="password">
        <div class="form-group"><label>Current Password</label><input type="password" name="current_password" required></div>
        <div class="form-group"><label>New Password</label><input type="password" name="new_password" required></div>
        <button type="submit" class="btn-gradient">Update Password</button>
    </form>
</div>

<div class="glass-card premium-form">
    <h3 style="margin-bottom:16px;color:#ef4444;"><i class="fas fa-trash"></i> Delete Account</h3>
    <p style="color:#94a3b8;font-size:14px;margin-bottom:16px;">This action is permanent and cannot be undone.</p>
    <form method="POST" onsubmit="return confirm('Delete your account permanently?');">
        <input type="hidden" name="action" value="delete">
        <button type="submit" class="btn-gradient" style="background:linear-gradient(135deg,#dc2626,#ef4444);">Delete Account</button>
    </form>
</div>
{% endblock %}
